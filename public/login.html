<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">Login</button>

<script>
const API = "https://gucopy.onrender.com";

function login(){
fetch(API + "/login",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="ok"){
localStorage.setItem("token", d.user.token);
location.href="index.html";
}else alert(d.status);
});
}
</script>
