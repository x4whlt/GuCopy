<link href="https://vjs.zencdn.net/8/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8/video.min.js"></script>

<div id="online"></div>
<video id="player" class="video-js" controls width="800"></video>

<script>
const API = "https://YOUR-RENDER.onrender.com";
const token = localStorage.getItem("token");

if(!token) location.href="login.html";

fetch(API + "/playlist?token=" + token)
.then(res=>res.json())
.then(data=>{
    const url = data.groups[0].channels[0].url;
    const player = videojs('player');
    player.src({ src: url, type: "application/x-mpegURL" });
});

// online
setInterval(()=>{
fetch(API + "/online")
.then(r=>r.json())
.then(d=>{
document.getElementById("online").innerText =
"👥 " + d.online + " online";
});
},3000);
</script>
