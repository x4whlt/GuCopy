<h2>ADMIN</h2>
<div id="users"></div>

<script>
const API = "https://gucopy.onrender.com";

fetch(API + "/users")
.then(r=>r.json())
.then(data=>{
let html="";
data.forEach(u=>{
html+=`
${u.username} | ${u.expire} | ${u.banned}
<button onclick="ban('${u.username}')">BAN</button>
<button onclick="vip('${u.username}')">VIP</button>
<hr>`;
});
users.innerHTML=html;
});

function ban(u){
fetch(API+"/ban",{method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({username:u})});
}

function vip(u){
let d=prompt("date YYYY-MM-DD");
fetch(API+"/vip",{method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({username:u,expire:d})});
}
</script>
